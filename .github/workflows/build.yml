name: build docker images

on:
  push:
    branches: [ "main" ] # 當 main 分支有 push 時觸發

# 賦予此工作流寫入（推送）GitHub Packages (GHCR) 的權限
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 這裡嚴格遵循您的要求：指定跑在 ubuntu:latest 容器中
    container:
      image: ubuntu:latest
      # 關鍵：掛載宿主機的 docker socket，這樣在容器內部才能執行 docker 指令
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
      # 第一步：準備環境 (安裝 docker-ce-cli, git, curl)
      - name: 第一步：準備環境
        run: |
          apt-get update
          apt-get install -y curl git gnupg lsb-release
          
          # 安裝 Docker CLI 必要憑證與來源
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://docker.com | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://docker.com $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          
          # 正式安裝 docker-ce-cli
          apt-get update
          apt-get install -y docker-ce-cli
          
          # 驗證安裝是否成功
          docker --version
          git --version
          curl --version

      # 第二步：複製儲存庫
      - name: 第二步：複製儲存庫
        run: |
          git clone https://github.com/syuankai/mcserver-alpine.git

      # 第三步：cd 進去並執行 docker build
      - name: 第三步：建立 Docker 映像檔
        run: |
          cd mcserver-alpine
          # 這裡使用 GitHub 規範的 GHCR 命名格式進行打包
          # 名稱會是：ghcr.io/您的使用者名稱/mcserver:alpine
          docker build -t ghcr.io/${{ github.repository_owner }}/mcserver:alpine .

      # 第四步：推送到該倉庫的 package (GHCR)
      - name: 第四步：登入並推送到 GitHub Packages
        run: |
          # 使用內建的秘密金鑰 GITHUB_TOKEN 自動登入 GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 將剛剛封裝好的映像檔推送到您 GitHub 帳號下的 Packages
          docker push ghcr.io/${{ github.repository_owner }}/mcserver:alpine
