name: build docker images

on:
  push:
    branches: [ "main" ] # 當 main 分支有 push 時觸發

# 賦予此工作流寫入（推送）GitHub Packages (GHCR) 的權限
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 這裡嚴格遵循您的要求：指定跑在 ubuntu:latest 容器中
    container:
      image: ubuntu:latest
      # 關鍵：掛載宿主機的 docker socket，這樣在容器內部才能執行 docker 指令
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
   # 第一步：準備環境 (修復 GPG 下載錯誤與互動式提示)
      - name: 準備環境
        env:
          DEBIAN_FRONTEND: noninteractive  # 解決 debconf frontend 報錯提示
        run: |
          apt-get update
          apt-get install -y curl git gnupg lsb-release ca-certificates
          
          # 建立金鑰目錄
          mkdir -p /etc/apt/keyrings
          
          # 修復：改用更安全的官方標準導入方式，直接儲存成明文金鑰
          curl -fsSL https://docker.com -o /etc/apt/keyrings/docker.asc
          
          # 設定來源清單（注意結尾改指向 docker.asc）
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://docker.com $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          
          # 再次更新並正式安裝 Docker CLI
          apt-get update
          apt-get install -y docker-ce-cli
          
          # 驗證安裝
          docker --version
          git --version
          curl --version
      # 第二步：複製儲存庫
      - name: 複製儲存庫
        run: |
          git clone https://github.com/syuankai/mcserver-alpine.git

      # 第三步：cd 進去並執行 docker build
      - name: 構建 Docker 映像檔
        run: |
          cd mcserver-alpine
          # 這裡使用 GitHub 規範的 GHCR 命名格式進行打包
          # 名稱會是：ghcr.io/您的使用者名稱/mcserver:alpine
          docker build -t ghcr.io/${{ github.repository_owner }}/mcserver:alpine .

      # 第四步：推送到該倉庫的 package (GHCR)
      - name: 推送到 GitHub Packages
        run: |
          # 使用內建的秘密金鑰 GITHUB_TOKEN 自動登入 GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 將剛剛封裝好的映像檔推送到您 GitHub 帳號下的 Packages
          docker push ghcr.io/${{ github.repository_owner }}/mcserver:alpine
