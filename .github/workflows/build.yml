name: build docker images

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:latest
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: 第一步：準備環境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y ca-certificates curl git
          
          # 建立金鑰目錄
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://docker.com -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          
          # 修正核心：強制指定使用 noble (24.04) 的 Docker 來源，避開未知的系統代號錯誤
          ARCH=$(dpkg --print-architecture)
          echo "deb [arch=$ARCH signed-by=/etc/apt/keyrings/docker.asc] https://docker.com noble stable" | tee /etc/apt/sources.list.d/docker.list
          
          # 重新更新並下載客戶端
          apt-get update
          apt-get install -y docker-ce-cli
          
          # 驗證
          docker --version
          git --version

      - name: 第二步：複製儲存庫
        run: |
          git clone https://github.com

      - name: 第三步：建立 Docker 映像檔
        run: |
          cd mcserver-alpine
          docker build -t ghcr.io/${{ github.repository_owner }}/mcserver:alpine .

      - name: 第四步：登入並推送到 GitHub Packages
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/mcserver:alpine
